<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zentro - E-commerce Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Zentro</div>
        <div class="cart">Cart: <span id="cart-count">0</span></div>
    </header>

    <div class="banner">
        <h1>Welcome to Zentro</h1>
        <p>Best Deals on Electronics & Fashion</p>
    </div>

    <div class="products" id="product-list"></div>

    <div class="cart-section">
        <h2>Your Cart</h2>
        <div id="cart-items"></div>
        <h3>Total: ₹<span id="total">0</span></h3>
        <button onclick="checkout()">Checkout</button>
    </div>

    <footer>
        <p>© 2025 Zentro. Made by Neeraj</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
